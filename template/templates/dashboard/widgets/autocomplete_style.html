<style>
  [x-cloak] { display: none !important; }

  /* crispy-tailwind rende i <select> negli inline con la sola classe `select`,
     senza bordo: lo allineiamo agli altri input della dashboard. */
  .select {
    background: #fff; border: 1px solid #d1d5db; border-radius: .5rem;
    padding: .5rem .75rem; line-height: 1.5; color: #374151;
  }

  .acw { position: relative; width: 100%; }
  /* Negli inline a tabella l'autocomplete prende piu' spazio. */
  table .acw { min-width: 18rem; }
  /* Box a "chip" della selezione multipla. */
  .acw__box {
    display: flex; flex-wrap: wrap; align-items: center; gap: .35rem;
    min-height: 2.4rem; padding: .3rem .4rem; border: 1px solid #e5e7eb;
    border-radius: .375rem; background: #fff;
  }
  .acw__box:focus-within { border-color: #9ca3af; }
  /* Selezione singola: look "select clearable" (valore come testo + x + chevron). */
  .acw__control {
    display: flex; align-items: center; min-height: 2.4rem;
    padding: 0 .5rem 0 .75rem; border: 1px solid #d1d5db;
    border-radius: .5rem; background: #fff;
  }
  .acw__control:focus-within { border-color: #9ca3af; }
  .acw__value { display: flex; align-items: center; gap: .5rem; width: 100%; padding: .4rem 0; }
  .acw__valuetext { flex: 1; min-width: 0; font-size: .9rem; color: #111827; }
  .acw__clear {
    border: 0; background: transparent; color: #6b7280; cursor: pointer;
    font-size: 1.15rem; line-height: 1; padding: 0 .15rem;
  }
  .acw__clear:hover { color: #dc2626; }
  .acw__search { flex: 1; min-width: 4rem; border: 0; outline: none; font-size: .9rem; background: transparent; padding: .5rem 0; }
  .acw__chevron { color: #9ca3af; font-size: 1.1rem; line-height: 1; pointer-events: none; }
  .acw__chip {
    display: inline-flex; align-items: center; gap: .3rem; padding: .1rem .5rem;
    background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 9999px;
    font-size: .8rem; color: #111827;
  }
  .acw__chiplink { color: #111827; text-decoration: underline; text-underline-offset: 2px; }
  .acw__chiplink:hover { color: #2563eb; }
  .acw__chipx {
    border: 0; background: transparent; color: #6b7280; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0;
  }
  .acw__chipx:hover { color: #dc2626; }
  .acw__input { flex: 1 1 6rem; min-width: 6rem; border: 0; outline: none; font-size: .9rem; background: transparent; }
  .acw__menu {
    position: absolute; z-index: 30; left: 0; right: 0; top: calc(100% + .25rem);
    max-height: 14rem; overflow-y: auto; background: #fff; border: 1px solid #e5e7eb;
    border-radius: .375rem; box-shadow: 0 6px 18px rgba(0, 0, 0, .12); padding: .25rem;
  }
  .acw__opt { padding: .4rem .55rem; border-radius: .25rem; font-size: .9rem; cursor: pointer; }
  .acw__opt:hover { background: #f3f4f6; }
</style>
