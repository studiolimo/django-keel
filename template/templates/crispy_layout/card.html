<div class="mb-4 rounded-lg border border-line bg-white {{ div.css_class|default:'' }}" {{ div.flat_attrs }}>
  {% if div.title %}
    <div class="border-b border-line px-4 py-3">
      <span class="text-sm font-medium">{{ div.title }}</span>
      {% if div.subtitle %}<span class="text-sm text-ink-faint">— {{ div.subtitle }}</span>{% endif %}
    </div>
  {% endif %}
  <div class="grid gap-4 p-4">{{ fields|safe }}</div>
</div>
