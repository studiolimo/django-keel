_templates_suffix: .jinja
_subdirectory: template
_min_copier_version: "9.0.0"

# Metadata
_metadata:
  version: "0.1.0"
  license: "MIT"
  author: "Django Keel Contributors"

# Project Basics
project_name:
  type: str
  help: Project name
  placeholder: "My Django Project"
  validator: "{% if not project_name or project_name.strip() == '' %}Project name cannot be empty{% endif %}"

project_slug:
  type: str
  help: Python package name (slug)
  default: "{{ project_name.lower().replace(' ', '_').replace('-', '_') }}"
  validator: "{% if not project_slug.isidentifier() %}Must be valid Python identifier{% endif %}"

project_description:
  type: str
  help: Project description
  placeholder: "A Django project built with django-keel"
  validator: "{% if not project_description or project_description.strip() == '' %}Project description cannot be empty{% endif %}"

project_domain_url:
  type: str
  help: PRODUCTION Project DOMAIN URL (without www)
  placeholder: "The production domain url in this form: example.com"
  default: ""

author_name:
  type: str
  help: Author name
  placeholder: "Your Name"

author_email:
  type: str
  help: Author email
  placeholder: "your.email@example.com"

# Git info
git_repository_org_name:
  type: str
  help: Git Organization Name
  default: "GITHUB_ORG_CHANGEME"

git_repository_project_slug:
  type: str
  help: Git Project Slug
  default: "GITHUB_SLUG_CHANGEME"

dev_email:
  type: str
  help: Dev email for this project
  default: 'changeme@changeme.it'

# Tech Stack
python_version:
  type: str
  help: Python version
  choices:
    - "3.14"
    - "3.13"
    - "3.12"
  default: "3.14"

# Post-generation instructions are now provided in the template's README
# instead of using _tasks to avoid the "unsafe feature" warning
